services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: finance-assistant-postgres
    environment:
      POSTGRES_DB: financeassistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
